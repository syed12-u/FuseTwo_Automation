trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

schedules:
  - cron: "0 13 * * *"
    displayName: Daily Playwright run
    branches:
      include:
        - main
        - master
    always: true

# Self-hosted agent pool. The agent runs on a Windows machine inside the
# Flexoffers network so it can reach the internal dev site (advertiser.dev.fusetwo.com -> 10.2.30.126),
# which Microsoft-hosted cloud agents cannot resolve or route to.
pool:
  name: Default

variables:
  nodeVersion: "20.x"

steps:
  - task: UseNode@1
    displayName: Use Node.js $(nodeVersion)
    inputs:
      version: $(nodeVersion)

  - script: npm ci
    displayName: Install npm dependencies

  # No --with-deps on Windows; that flag installs Linux apt packages only.
  - script: npx playwright install chromium
    displayName: Install Playwright browsers

  # Build .env on the agent. Secrets are mapped via env (Azure does not expand
  # secret $(...) macros into inline scripts), then written with PowerShell.
  - powershell: |
      @"
      URL=$env:URL
      HOME_URL=$env:HOME_URL
      FO_USERNAME=$env:FO_USERNAME
      FO_PASSWORD=$env:FO_PASSWORD
      FLEXOFFERS_SIGNUP_URL=$env:FLEXOFFERS_SIGNUP_URL
      CONTROL_USERNAME=$env:CONTROL_USERNAME
      CONTROL_PASSWORD=$env:CONTROL_PASSWORD
      BRIGHTDATA_HOST=$env:BRIGHTDATA_HOST
      BRIGHTDATA_PORT=$env:BRIGHTDATA_PORT
      BRIGHTDATA_USERNAME=$env:BRIGHTDATA_USERNAME
      BRIGHTDATA_PASSWORD=$env:BRIGHTDATA_PASSWORD
      "@ | Out-File -FilePath .env -Encoding ascii
    displayName: Create runtime environment file
    env:
      URL: $(URL)
      HOME_URL: $(HOME_URL)
      FO_USERNAME: $(FO_USERNAME)
      FO_PASSWORD: $(FO_PASSWORD)
      FLEXOFFERS_SIGNUP_URL: $(FLEXOFFERS_SIGNUP_URL)
      CONTROL_USERNAME: $(CONTROL_USERNAME)
      CONTROL_PASSWORD: $(CONTROL_PASSWORD)
      BRIGHTDATA_HOST: $(BRIGHTDATA_HOST)
      BRIGHTDATA_PORT: $(BRIGHTDATA_PORT)
      BRIGHTDATA_USERNAME: $(BRIGHTDATA_USERNAME)
      BRIGHTDATA_PASSWORD: $(BRIGHTDATA_PASSWORD)

  # Network preflight: the setup test fails with net::ERR_NAME_NOT_RESOLVED for
  # advertiser.dev.fusetwo.com, meaning this agent can't resolve the internal dev
  # host. This step is diagnostic only (continueOnError) -- it prints which agent
  # ran, its DNS config, whether the host resolves, and whether the documented
  # internal IP (10.2.30.126) is reachable on 443, so we can pinpoint the fix.
  - powershell: |
      $ErrorActionPreference = 'Continue'
      $targetHost = 'advertiser.dev.fusetwo.com'
      $targetIp   = '10.2.30.126'
      Write-Host "=== Agent ==="
      Write-Host "Agent.Name : $env:AGENT_NAME"
      Write-Host "Hostname   : $env:COMPUTERNAME"
      Write-Host "`n=== DNS servers ==="
      Get-DnsClientServerAddress -AddressFamily IPv4 | Format-Table -AutoSize | Out-String | Write-Host
      Write-Host "=== nslookup $targetHost ==="
      cmd /c "nslookup $targetHost" 2>&1 | Out-String | Write-Host
      Write-Host "=== Resolve-DnsName $targetHost ==="
      try { Resolve-DnsName $targetHost -ErrorAction Stop | Format-Table -AutoSize | Out-String | Write-Host }
      catch { Write-Host "Resolve-DnsName failed: $($_.Exception.Message)" }
      Write-Host "=== TCP 443 to hostname $targetHost ==="
      Test-NetConnection -ComputerName $targetHost -Port 443 -WarningAction SilentlyContinue | Format-List | Out-String | Write-Host
      Write-Host "=== TCP 443 to documented IP $targetIp ==="
      Test-NetConnection -ComputerName $targetIp -Port 443 -WarningAction SilentlyContinue | Format-List | Out-String | Write-Host
    displayName: Network preflight diagnostics (advertiser.dev.fusetwo.com)
    continueOnError: true

  # NOTE: the DNS workaround for net::ERR_NAME_NOT_RESOLVED is now done in
  # playwright.config.ts via Chromium's --host-resolver-rules (CI-only), which
  # maps advertiser.dev.fusetwo.com -> 10.2.30.126 inside the browser. That needs
  # no admin and no hosts-file edit (the agent service can't write hosts), so the
  # previous hosts-file step was removed. The preflight step above still reports
  # whether 10.2.30.126:443 is reachable from the agent.

  # Run all Playwright projects (setup + chromium + geo-login) in a single
  # invocation. A single run is deliberate: Playwright wipes the test-results/
  # output dir at the start of every run, so two separate runs would erase each
  # other's artifacts and junit. continueOnError lets the run report failures
  # without reddening the build here -- the gate step below decides red/green.
  # Files excluded via testIgnore in playwright.config.ts still won't run until
  # their known issues are fixed (signup CAPTCHA, message-center login, etc.).
  - script: npx playwright test
    displayName: Run Playwright tests (all projects)
    continueOnError: true
    env:
      CI: "true"

  # Publishes ALL results (including geo-login) to the Tests tab for visibility.
  # failTaskOnFailedTests is false here because the gate step below is what
  # actually fails the build -- and only on functional (non-diagnostic) failures.
  - task: PublishTestResults@2
    displayName: Publish JUnit test results
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: test-results/junit.xml
      failTaskOnFailedTests: false

  - task: PublishPipelineArtifact@1
    displayName: Publish Playwright HTML report
    condition: succeededOrFailed()
    inputs:
      targetPath: playwright-report
      artifact: playwright-report
      publishLocation: pipeline

  - task: PublishPipelineArtifact@1
    displayName: Publish Playwright test artifacts
    condition: succeededOrFailed()
    inputs:
      targetPath: test-results
      artifact: test-results
      publishLocation: pipeline

  # Final red/green decision. The geo-login project tests are diagnostic: they
  # FAIL on purpose when the dev site returns a 502 through the BrightData proxy,
  # producing the 502 JSON reports published above. Those must NOT red the build.
  # This step reds the build only when a NON-diagnostic (functional) test failed.
  # Transient flakiness is already absorbed by retries:2 in playwright.config.ts.
  - powershell: |
      $junit = 'test-results/junit.xml'
      if (-not (Test-Path $junit)) {
        Write-Host "##vso[task.logissue type=error]No JUnit results at $junit - tests did not run."
        exit 1
      }
      [xml]$results = Get-Content $junit
      $cases = $results.SelectNodes('//testcase')
      $blocking = @()
      foreach ($c in $cases) {
        # Check for child <failure>/<error> nodes directly. Do NOT use $c.failure:
        # an empty <failure/> exposes its (blank) inner text, which reads as falsy.
        if ($c.SelectNodes('failure').Count -eq 0 -and $c.SelectNodes('error').Count -eq 0) { continue }
        $id = "$($c.classname) > $($c.name)"
        # Geo-login diagnostics: matched by their describe/title text. Non-gating.
        if ($id -match 'BrightData|Geo-Location') {
          Write-Host "Ignoring non-gating geo-login diagnostic failure: $id"
        } else {
          $blocking += $id
        }
      }
      if ($blocking.Count -gt 0) {
        Write-Host "##vso[task.logissue type=error]$($blocking.Count) functional test failure(s) - failing the build:"
        $blocking | ForEach-Object { Write-Host "  - $_" }
        exit 1
      }
      Write-Host "No blocking functional failures. Geo-login diagnostics (if any) are non-gating."
    displayName: Gate build on functional failures (geo-login excluded)
    condition: succeededOrFailed()
